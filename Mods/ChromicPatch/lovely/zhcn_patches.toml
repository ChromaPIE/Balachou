[[patches]]
[patches.pattern]
target = '=[SMODS RiftRaft "src/VoidPacks.lua"]'
pattern = '''
"Choose {C:attention}#1#{} of up to",
"{C:attention}#2#{C:riftraft_void} Rift{} cards to",
"be used immediately",
},
group_name = "Void Pack",
'''
