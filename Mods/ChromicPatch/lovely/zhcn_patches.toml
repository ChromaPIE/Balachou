[[patches]]
[patches.pattern]
target = '=[SMODS kino "src/actor_ui.lua"]'
match_indent = true
position = "at"
pattern = '''
if _value > 999999999 then
local _start, _garb = string.sub(_value, 1, -10)
_text = "$" .. _start .. " Billion"    
elseif _value > 999999 then
local _start, _garb = string.sub(_value, 1, -7)
_text = "$" .. _start .. " Million"  
elseif _value > 999 then
local _start, _garb = string.sub(_value, 1, -4)
_text = "$" .. _start .. " Thousand"  
end
'''
payload = '''
if _value > 99999999 then
local _start = string.sub(_value, 1, -9)
_text = "$" .. _start .. " 亿"
elseif _value > 9999 then
local _start = string.sub(_value, 1, -5)
_text = "$" .. _start .. " 万"
elseif _value > 999 then
local _start = string.sub(_value, 1, -4)
_text = "$" .. _start .. " 千"
end
'''

# Wormhole: Have to prepend a '/' to the target path: lovely-injector/issues/366
[[patches]]
[patches.pattern]
target = '=[SMODS Wormhole "/content/Hedonia/menu.lua"]'
match_indent = true
position = "at"
pattern = '''config = { extra = 3, choose = 1, name = "Menu Pack" },'''
payload = '''config = { extra = 3, choose = 1, name = "餐品包" },'''

[[patches]]
[patches.pattern]
target = '=[SMODS Wormhole "/content/Hedonia/menu.lua"]'
match_indent = true
position = "at"
pattern = '''config = { extra = 4, choose = 1, name = "Jumbo Menu Pack" },'''
payload = '''config = { extra = 4, choose = 1, name = "巨型餐品包" },'''

[[patches]]
[patches.pattern]
target = '=[SMODS Wormhole "/content/Hedonia/menu.lua"]'
match_indent = true
position = "at"
pattern = '''config = { extra = 4, choose = 2, name = "Mega Menu Pack" },'''
payload = '''config = { extra = 4, choose = 2, name = "超级餐品包" },'''

# Polar Skull rocket: localize #1# hand type in tooltip
# loc_vars passes card.ability.extra.hand directly ("High Card") instead of
# localize(hand, 'poker_hands') ("高牌")
[[patches]]
[patches.pattern]
target = '=[SMODS Wormhole "/content/Polar Skull/rockets.lua"]'
match_indent = true
position = "at"
pattern = '''card.ability.extra.hand,
                    ppm and localize("k_polarskull_unlimited") or card.ability.extra.rounds,'''
payload = '''localize(card.ability.extra.hand, 'poker_hands'),
                    ppm and localize("k_polarskull_unlimited") or card.ability.extra.rounds,'''

