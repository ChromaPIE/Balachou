target = '=[SMODS allinjest "Utils/ui.lua"]'
match_indent = true
pattern = '''
				bypass_lock = true,
				playing_card = i,
				viewing_back = false,
'''
position = "at"
payload = '''
				bypass_lock = true,
				viewing_back = false,
'''

