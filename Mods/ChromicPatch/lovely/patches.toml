# SOE energy: loc_vars-bound value mutation helper
[[patches]]
[patches.pattern]
target = '=[SMODS SealsOnEverything "synonyms/consumeables/vice.lua"]'
match_indent = true
pattern = '''
SMODS.Consumable {
    key = 'energy',
'''
position = "before"
payload = '''
local function soe_energy_collect_number_paths(root, shown, paths, seen, path)
    if seen[root] then return end
    seen[root] = true
    for k, v in pairs(root) do
        local next_path = {unpack(path)}
        next_path[#next_path + 1] = k
        if type(v) == 'number' and shown[v] then
            paths[#paths + 1] = next_path
        elseif type(v) == 'table' then
            soe_energy_collect_number_paths(v, shown, paths, seen, next_path)
        end
    end
end

local function soe_energy_get_path(root, path)
    local current = root
    for i = 1, #path - 1 do
        current = current[path[i]]
    end
    return current, path[#path]
end

local function soe_energy_modify_joker_values(joker)
    if not joker or not joker.ability then return end
    local vars = {joker:generate_UIBox_ability_table(true)}
    vars = vars[1] or {}
    local shown = {}
    for _, v in ipairs(vars) do
        if type(v) == 'number' then shown[v] = true end
    end
    local name = joker.ability.name
    if name == 'Throwback' then
        joker.ability.extra = joker.ability.extra + 1
        joker.ability.x_mult = joker.ability.x_mult + 1
        return
    elseif name == 'Caino' then
        joker.ability.extra = joker.ability.extra + 1
        joker.ability.caino_xmult = joker.ability.caino_xmult + 1
        return
    elseif name == 'Red Card' then
        joker.ability.extra = joker.ability.extra + 1
        joker.ability.mult = joker.ability.mult + 1
        return
    elseif name == 'Blue Joker' then
        local deck_count = ((G.deck and G.deck.cards) and #G.deck.cards or 52)
        joker.ability.soe_energy_blue_joker_chip_delta = (joker.ability.soe_energy_blue_joker_chip_delta or 0) + 1 - deck_count
        joker.ability.extra = joker.ability.extra + 1
        return
    end
    if type(joker.ability.extra) == 'number' and shown[joker.ability.extra] then
        joker.ability.extra = joker.ability.extra + 1
        return
    end
    if type(joker.ability.extra) ~= 'table' then return end
    local paths = {}
    soe_energy_collect_number_paths(joker.ability.extra, shown, paths, {}, {})
    for _, path in ipairs(paths) do
        local ref_table, ref_value = soe_energy_get_path(joker.ability.extra, path)
        ref_table[ref_value] = ref_table[ref_value] + 1
    end
end
'''

