[manifest]
version = "1.0.0"
dump_lua = true
priority = 9999

# conf.lua width/height=0 means "use desktop size", producing a fullscreen black flash on launch
[[patches]]
[patches.pattern]
target = "conf.lua"
match_indent = true
pattern = "t.window.width = 0"
position = "at"
payload = "t.window.width = 1000"

[[patches]]
[patches.pattern]
target = "conf.lua"
match_indent = true
pattern = "t.window.height = 0"
position = "at"
payload = "t.window.height = 650"

[[patches]]
[patches.pattern]
target = "conf.lua"
match_indent = true
pattern = "t.window.minwidth = 100"
position = "before"
payload = "t.window.resizable = true"

# apply_window_changes: use screen_res instead of 0.8*current_width in Windowed mode
[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
match_indent = true
pattern = "(G.SETTINGS.QUEUED_CHANGE and G.SETTINGS.QUEUED_CHANGE.screenmode == 'Windowed') and love.graphics.getWidth()*0.8 or G.SETTINGS.WINDOW.DISPLAYS[G.SETTINGS.WINDOW.selected_display].screen_res.w,"
position = "at"
payload = "G.SETTINGS.WINDOW.DISPLAYS[G.SETTINGS.WINDOW.selected_display].screen_res.w,"

[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
match_indent = true
pattern = "(G.SETTINGS.QUEUED_CHANGE and G.SETTINGS.QUEUED_CHANGE.screenmode == 'Windowed') and love.graphics.getHeight()*0.8 or G.SETTINGS.WINDOW.DISPLAYS[G.SETTINGS.WINDOW.selected_display].screen_res.h,"
position = "at"
payload = "G.SETTINGS.WINDOW.DISPLAYS[G.SETTINGS.WINDOW.selected_display].screen_res.h,"

# skip updateMode on initial Windowed launch to avoid white flash from OpenGL context reset
[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
match_indent = true
pattern = "love.window.updateMode("
position = "before"
payload = '''
if _initial and G.SETTINGS.WINDOW.screenmode == 'Windowed' and love.graphics.getWidth() == G.SETTINGS.WINDOW.DISPLAYS[G.SETTINGS.WINDOW.selected_display].screen_res.w and love.graphics.getHeight() == G.SETTINGS.WINDOW.DISPLAYS[G.SETTINGS.WINDOW.selected_display].screen_res.h and love.system.getOS() ~= 'OS X' then
    G.SETTINGS.QUEUED_CHANGE = {}
    return
end
'''

