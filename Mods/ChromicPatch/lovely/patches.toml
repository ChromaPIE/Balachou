# ArtBox j_artb_random: reroll each sub-component when target is a merged card
[[patches]]
[patches.pattern]
target = '=[SMODS artbox "jokers/random.lua"]'
match_indent = true
position = "at"
pattern = '''
                    SMODS.add_card {
                        set = 'Joker',
                        rarity = rarity,
                        edition = v.edition,
                        stickers = stickers
                    }
                     G.jokers:remove_card(v)
                     v:remove()
'''
payload = '''
                    SMODS.add_card {
                        set = 'Joker',
                        rarity = rarity,
                        edition = v.edition,
                        stickers = stickers
                    }
                    if v.ability.soe_mergedcards and v.ability.soe_mergedcards[1] then
                        local new_card = G.jokers.cards[#G.jokers.cards]
                        local sub_cards = {}
                        for _, mc in ipairs(v.ability.soe_mergedcards) do
                            if mc.set == 'Joker' and mc.key then
                                local sub_rarity = G.P_CENTERS[mc.key] and G.P_CENTERS[mc.key].rarity
                                if type(sub_rarity) == "number" then
                                    if sub_rarity==1 then sub_rarity="Common"
                                    elseif sub_rarity==2 then sub_rarity="Uncommon"
                                    elseif sub_rarity==3 then sub_rarity="Rare"
                                    elseif sub_rarity==4 then sub_rarity="Legendary" end
                                end
                                local sub_card = SMODS.create_card({set = 'Joker', rarity = sub_rarity or 'Common', skip_materialize = true, stickers = mc.stickers})
                                if type(sub_card) == 'table' and sub_card.config then
                                    table.insert(sub_cards, sub_card)
                                end
                            end
                        end
                        if sub_cards[1] then
                            SEALS.merge_cards(new_card, sub_cards, true, true)
                        end
                    end
                     G.jokers:remove_card(v)
                     v:remove()
'''

