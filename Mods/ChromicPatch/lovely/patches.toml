# SMODS create_card: accept object-poll args that use `type` instead of `set`
# Steamodded shop creation builds {type = 'Joker', key = ...}; the current
# SMODS.create_card path only forwards t.set, so forced keys can reach vanilla
# create_card with _type=nil and crash in get_current_pool.
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
match_indent = true
pattern = "local _card = create_card(t.set, t.area, t.legendary, t.rarity, t.skip_materialize, t.soulable, t.key, t.key_append)"
position = "at"
payload = "local _card = create_card(t.set or t.type, t.area, t.legendary, t.rarity, t.skip_materialize, t.soulable, t.key, t.key_append)"

# SMODS create_blind_pool: nil-guard boolean true values from unused boss blinds
# eligible_bosses entries not in G.GAME.bosses_used stay as `true` (boolean),
# which crashes the `eligible_bosses[k] > min_use` comparison at line 195
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils/weights.lua"]'
match_indent = true
pattern = "if eligible_bosses[k] > min_use then"
position = "at"
payload = "if type(eligible_bosses[k]) == 'number' and eligible_bosses[k] > min_use then"

# AIJ retrieve_joker_text get_text(): fix operator precedence for Dynatext fallback
# `text .. chosen_option.string or get_text(...)` parses as `(text .. string) or get_text(...)`
# because Lua .. binds tighter than `or`. When chosen_option has no `string` field,
# concatenation with nil crashes. Add parens so `or` evaluates first.
[[patches]]
[patches.pattern]
target = '=[SMODS allinjest "Utils/functions.lua"]'
match_indent = true
pattern = "text = text .. chosen_option.string or get_text(chosen_option)"
position = "at"
payload = "text = text .. (chosen_option.string or get_text(chosen_option))"

# Kino Vulcan: fix loc_vars showing stacks count instead of actual upgrade amount
# Text uses #2#, which was `stacks`; use() actually upgrades by mult * stacks
# Now #2# = mult * stacks — matches the actual upgrade applied in use()
# #1# = mult (unused by text, kept for array index stability)
[[patches]]
[patches.pattern]
target = '=[SMODS kino "items/consumables/planets.lua"]'
match_indent = true
position = "at"
pattern = '''    loc_vars = function(self, info_queue, card)
        return {
            vars = {
                card.ability.extra.mult,
                card.ability.extra.stacks
            }
        }
    end,'''
payload = '''    loc_vars = function(self, info_queue, card)
        return {
            vars = {
                card.ability.extra.mult,
                card.ability.extra.mult * card.ability.extra.stacks
            }
        }
    end,'''

# AIJ Fabled sleeve: nil-guard deck_or_sleeve.config.extra when should_increase is false
# After buying a legendary joker, should_increase=false causes fallback to
# G.GAME.selected_back.effect (which lacks config.extra), crashing at end_of_round
[[patches]]
[patches.pattern]
target = '=[SMODS allinjest "Items/Crossmod/Sleeves/fabled.lua"]'
match_indent = true
pattern = "if context.end_of_round and not context.repetition and not context.individual and deck_or_sleeve.config.extra.should_increase then"
position = "at"
payload = "if context.end_of_round and not context.repetition and not context.individual and deck_or_sleeve.config.extra and deck_or_sleeve.config.extra.should_increase then"

# Kino Mr. Glass: nil-guard _target when no jokers exist
# get_counter_targets({}) → {} → pseudorandom_element({}) → nil → crash at :juice_up()
[[patches]]
[patches.regex]
target = '=[SMODS kino "items/blinds/blind_normal.lua"]'
pattern = '''(?<indent>[\t ]*)local _target = pseudorandom_element\(_valid_targets\)\s*_target:juice_up\(\)\s*_target:bb_counter_apply\("counter_kino_glass", self\.debuff\.counters_applied\)'''
position = "at"
line_prepend = "$indent"
payload = '''local _target = pseudorandom_element(_valid_targets)
if _target then
    _target:juice_up()
    _target:bb_counter_apply("counter_kino_glass", self.debuff.counters_applied)
end'''
times = 2

# Kino Pan's Labyrinth: nil-guard card in generate_ui when called without a card context
# AIJ retrieve_joker_text passes nil as card to generate_card_ui during pool building
[[patches]]
[patches.pattern]
target = '=[SMODS kino "items/jokers/pans_labyrinth.lua"]'
match_indent = true
position = "at"
pattern = '''generate_ui = function(self, info_queue, card, desc_nodes, specific_vars, full_UI_table)
        local _desc_nodes_dummy = {}'''
payload = '''generate_ui = function(self, info_queue, card, desc_nodes, specific_vars, full_UI_table)
        if not card then return end
        local _desc_nodes_dummy = {}'''

# Kino Count Rugen discard: skip forced deselect when ≤1 card highlighted
# Otherwise the discard becomes a no-op (harmless but pointless)
[[patches]]
[patches.regex]
target = '=[SMODS kino "src/kinofunctions.lua"]'
pattern = '''(?<discard_indent>[\t ]*)if G\.GAME\.current_round\.count_rugen then\s*local _target = pseudorandom_element\(G\.hand\.highlighted, pseudoseed\("kino_count_rugen"\)\)\s*G\.hand:remove_from_highlighted\(_target, true\)\s*card_eval_status_text\(_target, 'extra', nil, nil, nil,\s*\{ message = localize\('k_kino_rugen'\), colour = G\.C\.BLACK\}\)\s*end\s*local _ret = _o_discard'''
position = "at"
line_prepend = "$discard_indent"
payload = '''if G.GAME.current_round.count_rugen and #G.hand.highlighted > 1 then
    local _target = pseudorandom_element(G.hand.highlighted, pseudoseed("kino_count_rugen"))
    G.hand:remove_from_highlighted(_target, true)
    card_eval_status_text(_target, 'extra', nil, nil, nil,
        { message = localize('k_kino_rugen'), colour = G.C.BLACK})
end

local _ret = _o_discard'''

# Kino Count Rugen play: when ≤1 card highlighted, treat as NOT ALLOWED instead of
# deselecting the last card (which would empty G.play and crash at NULL hand)
[[patches]]
[patches.pattern]
target = '=[SMODS kino "src/kinofunctions.lua"]'
match_indent = true
position = "at"
pattern = '''local _o_play = G.FUNCS.play_cards_from_highlighted
G.FUNCS.play_cards_from_highlighted = function(e)
    if G.GAME.current_round.count_rugen then
        local _target = pseudorandom_element(G.hand.highlighted, pseudoseed("kino_count_rugen"))
        G.hand:remove_from_highlighted(_target, true)
        card_eval_status_text(_target, 'extra', nil, nil, nil,
            { message = localize('k_kino_rugen'), colour = G.C.BLACK})
    end

    local _ret = _o_play(e)
    return _ret
end'''
payload = '''local _o_play = G.FUNCS.play_cards_from_highlighted
G.FUNCS.play_cards_from_highlighted = function(e)
    if G.GAME.current_round.count_rugen then
        if #G.hand.highlighted <= 1 then
            play_area_status_text(localize('k_chromicpatch_no_card_played'))
            G.hand:unhighlight_all()
            ease_hands_played(-1)
            G.STATE = G.STATES.DRAW_TO_HAND
            G.STATE_COMPLETE = false
            return
        end
        local _target = pseudorandom_element(G.hand.highlighted, pseudoseed("kino_count_rugen"))
        G.hand:remove_from_highlighted(_target, true)
        card_eval_status_text(_target, 'extra', nil, nil, nil,
            { message = localize('k_kino_rugen'), colour = G.C.BLACK})
    end

    local _ret = _o_play(e)
    return _ret
end'''

# Kino j_kino_x: fix draw-4 effect — G.FUNCS.draw_from_deck_to_hand ignores
# its count argument and recalculates limit internally.  Since hand is already
# full after first_hand_drawn, limit=0 and nothing gets drawn.
# SMODS's CardArea:draw_card_from bypasses the hand limit for G.hand, so
# direct draw_card() calls actually draw cards regardless of current hand size.
[[patches]]
[patches.pattern]
target = '=[SMODS kino "items/jokers/x.lua"]'
match_indent = true
position = "at"
pattern = "G.FUNCS.draw_from_deck_to_hand(card.ability.extra.cards_drawn)"
payload = '''for i = 1, card.ability.extra.cards_drawn do
                    if #G.deck.cards > 0 then
                        draw_card(G.deck, G.hand, i*100/card.ability.extra.cards_drawn, 'up', true)
                    end
                end'''
