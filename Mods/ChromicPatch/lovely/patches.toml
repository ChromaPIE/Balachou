# AIJ credits custom_ui: do not mark Joker display cards as playing cards
# These cards use Joker centers in the mod description UI. Setting
# playing_card makes hover UI hooks build playing-card metadata from
# G.P_CARDS.empty, whose rank/suit are nil.
