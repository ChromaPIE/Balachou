# SOE voucher enhancements: make tooltip vars use voucher UI semantics
# The original fake ability has name/config but no set='Voucher', so
# Card.generate_UIBox_ability_table never enters its voucher loc_vars branch.
[[patches]]
[patches.pattern]
target = '=[SMODS SealsOnEverything "main.lua"]'
match_indent = true
pattern = '''loc_vars = (not vv.original_mod and function()
                    local ability = copy_table(vv.config)
                    ability.name = vv.name
                    local loc_vars, main_start, main_end = Card.generate_UIBox_ability_table({ability = ability, config = {center = vv}}, true)
                    return {vars = loc_vars, main_start = main_start, main_end = main_end}
                end) or vv.loc_vars or nil,'''
position = "at"
payload = '''loc_vars = function(center, info_queue, card)
                    local use_card_ability = card and card.ability and (card.fake_card == center.key or (card.config and card.config.center == center))
                    local cfg = use_card_ability and card.ability or vv.config or {}
                    local fake_card = {ability = copy_table(cfg), config = {center = vv, center_key = vv.key}, fake_card = vv.key}
                    fake_card.ability.name = vv.name
                    fake_card.ability.set = 'Voucher'
                    if vv.loc_vars and type(vv.loc_vars) == 'function' then
                        local res = vv:loc_vars(info_queue, fake_card) or {}
                        if res.vars or res.key or res.set or res.main_start or res.main_end then return res end
                    end
                    local vars = nil
                    if vv.name == "Overstock" or vv.name == "Overstock Plus" then
                    elseif vv.name == "Tarot Merchant" or vv.name == "Tarot Tycoon" then vars = {cfg.extra_disp}
                    elseif vv.name == "Planet Merchant" or vv.name == "Planet Tycoon" then vars = {cfg.extra_disp}
                    elseif vv.name == "Hone" or vv.name == "Glow Up" then vars = {cfg.extra}
                    elseif vv.name == "Reroll Surplus" or vv.name == "Reroll Glut" then vars = {cfg.extra}
                    elseif vv.name == "Grabber" or vv.name == "Nacho Tong" then vars = {cfg.extra}
                    elseif vv.name == "Wasteful" or vv.name == "Recyclomancy" then vars = {cfg.extra}
                    elseif vv.name == "Seed Money" or vv.name == "Money Tree" then vars = {cfg.extra/5}
                    elseif vv.name == "Blank" or vv.name == "Antimatter" then
                    elseif vv.name == "Hieroglyph" or vv.name == "Petroglyph" then vars = {cfg.extra}
                    elseif vv.name == "Director's Cut" or vv.name == "Retcon" then vars = {cfg.extra}
                    elseif vv.name == "Paint Brush" or vv.name == "Palette" then vars = {cfg.extra}
                    elseif vv.name == "Telescope" or vv.name == "Observatory" then vars = {cfg.extra}
                    elseif vv.name == "Clearance Sale" or vv.name == "Liquidation" then vars = {cfg.extra}
                    end
                    return {vars = vars or {}}
                end,'''

