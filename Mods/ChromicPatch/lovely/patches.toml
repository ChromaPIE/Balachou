                if v and v[1] then
                    print(localize({type = 'name_text', key = k, set = 'Enhanced'})..' '..#v..' time'..((#v == 1) and '' or 's'))
                end
            end
        end
    end
}'''
payload = '''SMODS.Keybind{
    key_pressed = 'i',
    action = function()
        local card = G and G.CONTROLLER and (G.CONTROLLER.focused.target or G.CONTROLLER.hovering.target)
        if not (card and type(card) == 'table' and card.config and card.config.center_key == 'j_soe_redfabric') then return end
