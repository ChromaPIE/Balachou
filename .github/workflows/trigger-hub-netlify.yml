name: Update repo tree manifest

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.lua'
      - '**/*.toml'
      - '**/*.json'
      - '.gitattributes'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  update-gist:
    name: Generate and upload repo tree
    runs-on: ubuntu-latest

    steps:
      - name: Fetch GitHub tree
        run: |
          curl -sS --fail \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/ChromaPIE/Balachou/git/trees/main?recursive=1" \
            | jq -c '[.tree[] | select(.type=="blob") | {p: .path, t: "f", s: (.size // 0)}] | sort_by(.p)' \
            > repo-tree.json
          echo "Generated repo-tree.json with $(jq length repo-tree.json) files"

      - name: Upload to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          CONTENT="$(python3 -c "import sys,json; json.dump(open('repo-tree.json').read(), sys.stdout)")"
          BODY="{\"files\":{\"repo-tree.json\":{\"content\":${CONTENT}}}}"
          curl -sS --fail -X PATCH \
            -H "Authorization: token ${GIST_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/gists/${GIST_ID}" \
            -d "${BODY}"
          echo "Uploaded repo-tree.json to Gist"
