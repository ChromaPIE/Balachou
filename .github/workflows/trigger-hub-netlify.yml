name: Update repo tree manifest

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.lua'
      - '**/*.toml'
      - '**/*.json'
      - '.gitattributes'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  update:
    name: Build manifest and font subset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fonttools
        run: pip install "fonttools[woff]" brotli

      - name: Build assets
        run: python scripts/build-manifest.py

      - name: Upload manifest to Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          jq -n --rawfile content repo-tree.json \
            '{files: {"repo-tree.json": {content: $content}}}' > gist.json
          gh api --method PATCH "/gists/${GIST_ID}" --input gist.json

      - name: Push font to Hub repo
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ChromaPIE/Balachou-Hub.git" hub
          cp sarasa-mono-slab-sc.woff2 hub/assets/
          cd hub
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/sarasa-mono-slab-sc.woff2
          if git diff --staged --quiet; then
            echo "Font unchanged, skipping push"
          else
            git commit -m "update font subset"
            git push
            echo "Font pushed to Hub"
          fi
