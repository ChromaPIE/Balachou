name: Update repo tree manifest

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.lua'
      - '**/*.toml'
      - '**/*.json'
      - '.gitattributes'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  update-gist:
    name: Build manifest and font subset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fonttools
        run: pip install "fonttools[woff]" brotli

      - name: Build assets
        run: python scripts/build-manifest.py

      - name: Upload to Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          gh api --method PATCH "/gists/${GIST_ID}" --input gist-body.json
          echo "Uploaded to Gist"
