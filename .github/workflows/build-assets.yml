name: Update repo tree manifest

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.lua'
      - '**/*.toml'
      - '**/*.json'
      - '.gitattributes'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Build manifest and font subset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fonttools
        run: pip install "fonttools[woff]" brotli

      - name: Build assets
        run: python scripts/build-manifest.py

      - name: Upload manifest to Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          jq -n --rawfile content repo-tree.json \
            '{files: {"repo-tree.json": {content: $content}}}' > gist.json
          gh api --method PATCH "/gists/${GIST_ID}" --input gist.json

      - name: Commit font to repo
        run: |
          if [ "$(cat font-updated.flag)" = "true" ]; then
            mkdir -p assets
            cp sarasa-mono-slab-sc.woff2 assets/
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/sarasa-mono-slab-sc.woff2 assets/char-set.txt
            git commit -m "update font subset [skip ci]"
            git push
            echo "Font committed"
          else
            echo "Character set unchanged, nothing to commit"
          fi
          echo "FONT_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Update font version on Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          FONT_COMMIT: ${{ env.FONT_COMMIT }}
        run: |
          jq -n --arg commit "${FONT_COMMIT}" \
            '{files: {"font-version.json": {content: $commit}}}' > fv.json
          gh api --method PATCH "/gists/${GIST_ID}" --input fv.json
